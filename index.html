<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal Calendar</title>
    <style>
        /* Exact Typography and Color matching based on the provided UI */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            /* Backgrounds */
            --bg-page: #161618;
            --bg-grid-gap: #000000;
            --bg-cell-empty: #1c1c1e;
            --bg-cell-pos: #1a2f1f;
            --bg-cell-neg: #321b1d;
            --bg-btn: #2b2d31;
            --bg-modal: #1e1e20;

            /* Text Colors */
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --text-very-muted: #4a4a4d;
            --text-week: #b0b0b5;
            
            /* P/L Colors */
            --color-pos: #4cd964;
            --color-neg: #ff453a;

            /* Accents */
            --accent-blue: #0a84ff;
            --accent-blue-outline: #0a84ff;

            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 1060px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* --- Header --- */
        .top-header {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .top-header span:first-child {
            color: var(--text-main);
            margin-right: 6px;
        }
        .monthly-pnl-val {
            color: var(--color-pos);
        }
        .monthly-pnl-val.negative {
            color: var(--color-neg);
        }
        .monthly-pnl-val.neutral {
            color: var(--text-muted);
        }

        /* --- Navigation Controls --- */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-group {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        .icon-btn:hover {
            color: var(--text-main);
        }
        .today-btn {
            background-color: var(--bg-btn);
            color: var(--text-muted);
            border: none;
            padding: 7px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .today-btn:hover {
            background-color: #36383d;
            color: var(--text-main);
        }

        /* --- Grid System --- */
        .days-row {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            text-align: center;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: -16px; 
            padding-right: 2px;
        }
        
        .calendar-grid {
            background-color: var(--bg-grid-gap);
            border: 1px solid var(--bg-grid-gap);
            border-radius: 6px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 1px;
            overflow: hidden;
        }

        /* --- Cell Layout --- */
        .cell {
            background-color: var(--bg-cell-empty);
            height: 104px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: filter 0.15s ease;
        }
        .cell.interactive:hover {
            filter: brightness(1.15);
        }
        
        /* The Exact Blue Outline on Today */
        .cell.is-today-box {
            box-shadow: inset 0 0 0 1.5px var(--accent-blue-outline);
            z-index: 2;
        }

        .cell.positive { background-color: var(--bg-cell-pos); }
        .cell.negative { background-color: var(--bg-cell-neg); }

        .date-number {
            position: absolute;
            top: 6px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #717175;
            font-weight: 500;
            display: flex;
            justify-content: center;
        }
        .date-number.dim { color: var(--text-very-muted); }
        
        /* The Exact Blue Circle on Today */
        .date-number .circle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        .date-number .circle.is-today-circle {
            background-color: var(--accent-blue);
            color: #ffffff;
            font-weight: 600;
        }

        .data-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 18px; /* Push down to clear the absolute date */
        }

        .pnl-text {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.2px;
            margin-bottom: 2px;
        }
        .pnl-text.positive { color: var(--color-pos); }
        .pnl-text.negative { color: var(--color-neg); }
        .pnl-text.neutral { color: var(--text-very-muted); }

        .trades-text {
            font-size: 11px;
            color: #717175;
            font-weight: 500;
        }
        .trades-text.neutral { color: var(--text-very-muted); }

        /* --- 8th Column (Weekly Summary) --- */
        .cell-week {
            background-color: var(--bg-cell-empty);
            cursor: default;
        }
        .week-label {
            position: absolute;
            top: 24px;
            width: 100%;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* --- Modal Popup UI --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(3px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-box {
            background-color: var(--bg-modal);
            border: 1px solid #333;
            border-radius: 12px;
            width: 340px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }
        .modal-overlay.active .modal-box {
            transform: scale(1);
        }
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
            color: var(--text-main);
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            background-color: #121213;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: var(--accent-blue);
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .btn:hover { filter: brightness(1.15); }
        .btn-cancel { background-color: var(--bg-btn); color: var(--text-main); }
        .btn-save { background-color: var(--color-pos); color: #000; }
        .btn-delete { background-color: transparent; border: 1px solid var(--color-neg); color: var(--color-neg); }

    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="top-header">
            <span>Monthly P/L:</span>
            <span id="monthly-pnl" class="monthly-pnl-val neutral">$0.00</span>
        </div>

        <div class="controls">
            <div class="nav-group">
                <button class="icon-btn" onclick="changeMonth(-1)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <span id="month-year-label">Month Year</span>
                <button class="icon-btn" onclick="changeMonth(1)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>
            <button class="today-btn" onclick="goToToday()">Today</button>
        </div>

        <div class="days-row">
            <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div><div></div>
        </div>

        <div class="calendar-grid" id="calendar-grid">
            <!-- Grid generated by JS -->
        </div>

    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal-box">
            <div class="modal-title" id="modal-date-title">Edit Entry</div>
            <div class="input-group">
                <label>P/L Amount ($)</label>
                <input type="number" id="input-pnl" step="0.01" placeholder="e.g. 435.86 or -120.50">
            </div>
            <div class="input-group">
                <label>Number of Trades</label>
                <input type="number" id="input-trades" min="0" placeholder="e.g. 2">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn btn-save" onclick="saveData()">Save</button>
            </div>
            <div style="margin-top: 12px; text-align: center;">
                 <button class="btn btn-delete" style="width: 100%; padding: 8px; font-size: 13px;" onclick="deleteData()">Clear Day</button>
            </div>
        </div>
    </div>

    <script>
        // --- Core State ---
        // Real-time actual date mapping. No hardcoded mock dates.
        const actualToday = new Date();
        let displayYear = actualToday.getFullYear();
        let displayMonth = actualToday.getMonth(); // 0-11
        
        let editingDateStr = null;

        // Load empty journal or user's saved data from LocalStorage
        let journalData = JSON.parse(localStorage.getItem('tradingJournal')) || {};

        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        // --- Utility Functions ---
        function formatMoney(amount) {
            const isNegative = amount < 0;
            const absoluteAmount = Math.abs(amount);
            // Formats to 1,002.08 exactly matching the UI screenshot style
            const formatted = new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(absoluteAmount);
            return isNegative ? `-$${formatted}` : `$${formatted}`;
        }

        function getDateKey(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function isTodayMatch(year, month, day) {
            return (day === actualToday.getDate() && month === actualToday.getMonth() && year === actualToday.getFullYear());
        }

        // Calculation exactly as image implies: week of the month based on the Saturday of that row.
        function getWeekOfMonth(saturdayDateNum) {
            return Math.ceil(saturdayDateNum / 7);
        }

        // --- Core Rendering Engine ---
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            // Update Header labels
            document.getElementById('month-year-label').textContent = `${monthNames[displayMonth]} ${displayYear}`;

            const firstDayOfMonth = new Date(displayYear, displayMonth, 1).getDay();
            const daysInCurrentMonth = new Date(displayYear, displayMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(displayYear, displayMonth, 0).getDate();

            // Typically requires 5 or 6 rows to fit the full month. 
            const totalCellsNeeded = firstDayOfMonth + daysInCurrentMonth;
            const rows = Math.ceil(totalCellsNeeded / 7);

            let currentDayCount = 1;
            let nextMonthDayCount = 1;
            
            let totalMonthlyPnl = 0;

            // Render loop for Grid Rows
            for (let row = 0; row < rows; row++) {
                let weeklyPnlSum = 0;
                let weeklyTradesSum = 0;
                let rowSaturdayDateNum = 1; 

                // 7 days (Columns 1-7)
                for (let col = 0; col < 7; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell interactive';

                    let cellDayNum;
                    let cellYear = displayYear;
                    let cellMonth = displayMonth;
                    let isCurrentMonthCell = false;
                    
                    // Logic to fill dates
                    if (row === 0 && col < firstDayOfMonth) {
                        cellDayNum = daysInPrevMonth - firstDayOfMonth + col + 1;
                        cellMonth = displayMonth - 1;
                        if (cellMonth < 0) { cellMonth = 11; cellYear--; }
                    } else if (currentDayCount <= daysInCurrentMonth) {
                        cellDayNum = currentDayCount;
                        isCurrentMonthCell = true;
                        currentDayCount++;
                    } else {
                        cellDayNum = nextMonthDayCount;
                        cellMonth = displayMonth + 1;
                        if (cellMonth > 11) { cellMonth = 0; cellYear++; }
                        nextMonthDayCount++;
                    }

                    // Store the Saturday date for week label reference
                    if (col === 6) {
                        rowSaturdayDateNum = cellDayNum;
                    }

                    const dateKey = getDateKey(cellYear, cellMonth, cellDayNum);
                    const cellData = journalData[dateKey];
                    const isToday = isTodayMatch(cellYear, cellMonth, cellDayNum);

                    // Add Blue Outline for today
                    if (isToday) {
                        cell.classList.add('is-today-box');
                    }

                    // Blue Circle inner html logic
                    let dateHtml = isToday 
                        ? `<div class="circle is-today-circle">${cellDayNum}</div>` 
                        : `<div class="circle">${cellDayNum}</div>`;
                    
                    let dateClass = isCurrentMonthCell ? 'date-number' : 'date-number dim';
                    cell.innerHTML = `<div class="${dateClass}">${dateHtml}</div>`;

                    // Populate Data if it exists
                    if (cellData) {
                        weeklyPnlSum += cellData.pnl;
                        weeklyTradesSum += cellData.trades;
                        
                        if (isCurrentMonthCell) {
                            totalMonthlyPnl += cellData.pnl;
                        }

                        let pnlClass = cellData.pnl > 0 ? 'positive' : (cellData.pnl < 0 ? 'negative' : 'neutral');
                        let sign = cellData.pnl > 0 ? '+' : '';
                        
                        if (cellData.pnl > 0) cell.classList.add('positive');
                        else if (cellData.pnl < 0) cell.classList.add('negative');

                        cell.innerHTML += `
                            <div class="data-wrapper">
                                <div class="pnl-text ${pnlClass}">${sign}${formatMoney(cellData.pnl)}</div>
                                <div class="trades-text">${cellData.trades} trades</div>
                            </div>
                        `;
                    }

                    // Click handler to edit
                    cell.onclick = () => openModal(dateKey, cellData, cellDayNum, monthNames[cellMonth], cellYear);
                    grid.appendChild(cell);
                }

                // --- 8th Column (Weekly Summary) ---
                const weekCell = document.createElement('div');
                weekCell.className = 'cell cell-week';
                
                let weekPnlClass = weeklyPnlSum > 0 ? 'positive' : (weeklyPnlSum < 0 ? 'negative' : 'neutral');
                let weekSign = weeklyPnlSum > 0 ? '+' : '';
                let weekNum = getWeekOfMonth(rowSaturdayDateNum);

                // Check if this Saturday is "today" to apply the circle in 8th column precisely as shown in image logic
                let isSatToday = isTodayMatch(
                    (row === rows - 1 && rowSaturdayDateNum < 10 && displayMonth !== actualToday.getMonth()) ? actualToday.getFullYear() : displayYear, 
                    (row === rows - 1 && rowSaturdayDateNum < 10) ? displayMonth + 1 : displayMonth, 
                    rowSaturdayDateNum
                );

                let satDateHtml = isSatToday 
                    ? `<div class="circle is-today-circle">${rowSaturdayDateNum}</div>` 
                    : `<div class="circle">${rowSaturdayDateNum}</div>`;

                weekCell.innerHTML = `
                    <div class="date-number">${satDateHtml}</div>
                    <div class="week-label">Week ${weekNum}</div>
                    <div class="data-wrapper">
                        <div class="pnl-text ${weekPnlClass}">${weeklyTradesSum > 0 || weeklyPnlSum !== 0 ? weekSign + formatMoney(weeklyPnlSum) : '$0.00'}</div>
                        <div class="trades-text ${weeklyTradesSum === 0 ? 'neutral' : ''}">${weeklyTradesSum} trades</div>
                    </div>
                `;

                grid.appendChild(weekCell);
            }

            // Update Top Header P/L
            const headerPnlElement = document.getElementById('monthly-pnl');
            let headerSign = totalMonthlyPnl > 0 ? '+' : '';
            headerPnlElement.textContent = `${headerSign}${formatMoney(totalMonthlyPnl)}`;
            
            headerPnlElement.className = 'monthly-pnl-val';
            if (totalMonthlyPnl > 0) headerPnlElement.classList.add('positive');
            else if (totalMonthlyPnl < 0) headerPnlElement.classList.add('negative');
            else headerPnlElement.classList.add('neutral');
        }

        // --- Interaction Logic ---
        function changeMonth(direction) {
            displayMonth += direction;
            if (displayMonth > 11) {
                displayMonth = 0;
                displayYear++;
            } else if (displayMonth < 0) {
                displayMonth = 11;
                displayYear--;
            }
            renderCalendar();
        }

        function goToToday() {
            displayMonth = actualToday.getMonth();
            displayYear = actualToday.getFullYear();
            renderCalendar();
        }

        // --- Modal Flow ---
        function openModal(dateKey, existingData, day, monthName, year) {
            editingDateStr = dateKey;
            document.getElementById('modal-date-title').textContent = `Entry for ${monthName} ${day}, ${year}`;
            
            const pnlInput = document.getElementById('input-pnl');
            const tradesInput = document.getElementById('input-trades');

            if (existingData) {
                pnlInput.value = existingData.pnl;
                tradesInput.value = existingData.trades;
            } else {
                pnlInput.value = '';
                tradesInput.value = '';
            }

            document.getElementById('edit-modal').classList.add('active');
            pnlInput.focus();
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.remove('active');
            editingDateStr = null;
        }

        function saveData() {
            if (!editingDateStr) return;

            const pnlVal = parseFloat(document.getElementById('input-pnl').value);
            const tradesVal = parseInt(document.getElementById('input-trades').value);

            // Validation
            if (isNaN(pnlVal) && isNaN(tradesVal)) {
                deleteData();
                return;
            }

            journalData[editingDateStr] = {
                pnl: isNaN(pnlVal) ? 0 : pnlVal,
                trades: isNaN(tradesVal) ? 0 : tradesVal
            };

            localStorage.setItem('tradingJournal', JSON.stringify(journalData));
            closeModal();
            renderCalendar();
        }

        function deleteData() {
            if (!editingDateStr) return;
            delete journalData[editingDateStr];
            localStorage.setItem('tradingJournal', JSON.stringify(journalData));
            closeModal();
            renderCalendar();
        }

        // Close modal when clicking outside the box
        document.getElementById('edit-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initialize App
        renderCalendar();

    </script>
</body>
</html>
